# cargo-deny policy. Run locally with `cargo deny check`.

[graph]
# Match CI: only check the host's default targets by default.
all-features = false

# ─── Advisories (RustSec) ──────────────────────────────────────────────────
[advisories]
version = 2
# Ignored individual advisory IDs — add with justification when needed.
ignore = []

# ─── Licenses ──────────────────────────────────────────────────────────────
# Permissive licenses we're willing to ship. Anything not listed triggers a
# review.
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ─── Crate bans ────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"   # informational; duplicates often come from transitive deps
wildcards = "deny"
highlight = "all"
# Known high-risk or abandoned crates can be explicitly denied here.
deny = []

# ─── Sources ───────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
