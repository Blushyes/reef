# cargo-deny policy. Run locally with `cargo deny check`.

[graph]
# Match CI: only check the host's default targets by default.
all-features = false

# ─── Advisories (RustSec) ──────────────────────────────────────────────────
[advisories]
version = 2
# Ignored individual advisory IDs — add with justification when needed.
# All current entries are transitive deps we don't directly pull; upgrading
# requires upstream action on syntect / test frameworks.
ignore = [
    "RUSTSEC-2024-0320", # yaml-rust unmaintained — via syntect → two-face
    "RUSTSEC-2025-0141", # bincode unmaintained — via a dev/test-time dep
    "RUSTSEC-2026-0097", # rand unsoundness under custom logger — not our usage pattern
]

# ─── Licenses ──────────────────────────────────────────────────────────────
# Permissive licenses we're willing to ship. Anything not listed triggers a
# review.
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

# Skip license checks on our own workspace crates (publish = false, shipped
# as binaries via npm, not as crates to crates.io).
[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ─── Crate bans ────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"     # informational; duplicates often come from transitive deps
wildcards = "deny"
allow-wildcard-paths = true    # workspace path deps legitimately omit versions
highlight = "all"
# Known high-risk or abandoned crates can be explicitly denied here.
deny = []

# ─── Sources ───────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
