name: Security

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  schedule:
    # Daily at 03:00 UTC — catches newly-disclosed CVEs even without code changes.
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  audit:
    name: cargo-audit (RustSec CVE scan)
    runs-on: ubuntu-latest
    # The audit action posts a check run annotation summarizing findings.
    # That requires `checks: write` in addition to the default read perms.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny (licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace
